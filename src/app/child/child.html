<p>
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" [(ngModel)]="name">
</p>

<p>
    <label for="name">Username:</label>
    <input type="text" id="name" name="name" [(ngModel)]="userName">
</p>

<p>
    <label for="city">City:</label>
    <input type="text" id="city" name="city" [(ngModel)]="userCity">
</p>

<p>
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="100"
        [(ngModel)]="userAge">
</p>

<p>
    <label for="role">Role:</label>
    <input type="text" id="role" name="role" [(ngModel)]="userRole">
</p>

<button type="button">Submit</button>
