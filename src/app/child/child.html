<p>
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" [ngModel]="userData().title"
        (ngModelChange)="updateField('title', $event)" required>
</p>

<p>
    <label for="name">Username:</label>
    <input type="text" id="name" name="name" [ngModel]="userData().userName"
        (ngModelChange)="updateField('userName', $event)" required>
</p>

<p>
    <label for="city">City:</label>
    <input type="text" id="city" name="city" [ngModel]="userData().userCity"
        (ngModelChange)="updateField('userCity', $event)" required>
</p>

<p>
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="100" [ngModel]="userData().userAge"
        (ngModelChange)="updateField('userAge', $event)" required>
</p>

<p>
    <label for="role">Role:</label>
    <input type="text" id="role" name="role" [ngModel]="userData().userRole"
        (ngModelChange)="updateField('userRole', $event)" required>
</p>

<button type="submit" (click)="onSubmit()" [disabled]="!isFormValid()">Submit</button>

<p>{{ currentDate() | date: 'HH:mm:ss' }}</p>
